name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  buildcore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build BuildCore
        env:
          GITHUB_ACTOR: xgoingleftyx
          GITHUB_TOKEN: ${{ secrets.VITAL_GPR_TOKEN }}
        run: ./gradlew :BuildCore:build --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: BuildCore/build/reports/tests/
